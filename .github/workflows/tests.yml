name: Run Tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Ruby & Ceedling
        run: |
          sudo apt-get update
          sudo apt-get install -y ruby
          gem install --user-install ceedling
          echo 'export PATH="$HOME/.local/share/gem/ruby/3.2.0/bin:$PATH"' >> $GITHUB_ENV
          
      - name: Run Ceedling Tests
        working-directory: wireless_station_firmware/tests
        run: ceedling test:all
